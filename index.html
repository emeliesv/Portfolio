<body>
    <div class="container">
        <header class="top-section"></header><!--Header is the top-section, should contain: This is where you sell in your new self. You're happy to combine your previous experience with your new frontend skills or basically use this are to describe yourself the way you see your role in the future. Either you do something like "Frontend + design" or more of a sentence like; "Frontend developer with a background in communications". Or if you don't see yourself as a frontend developer in the future maybe you want to write something like; "Project manager with coding skills". It's your portfolio. Choose images so that they mirror who you are. -->
        <main>
            <div class="summary"></div> <!--Short and to the point, who am I? Future desires?-->
            <div class="tech"></div> <!--Short summary/name dropping of technologies, tools, libraries and things I know and will know during the course-->
            <div class="featured-projects"></div><!--Should consist of all my projects that I'm mostly proud of. Mention technologies, libraries and APIs used. Make sure that everything here is a link to my GitHub-page (image, text, div etc)!-->
        </main>
    </div>
