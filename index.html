<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="./style.css" />
    <title>Coolio Portfolio</title>
</head>

<body class="container">

    <header class="header">
        <!--Imported from font awesome: fa (font awesome) and styles for github, linkedin and github. link to rel=noopener noreferrer explanation: https://www.reliablesoft.net/noreferrer-noopener/-->
        <section class="header-links">
            <a href="" class="icon-anchor" target="_blank" rel="noopener noreferrer">
                <i class="fa fa-linkedin"></i>
                <span class="sr-only">LinkedIn</span>
            </a>
            <a href="" class="icon-anchor" target="_blank" rel="noopener noreferrer">
                <i class="fa fa-github"></i>
                <span class="sr-only">GitHub</span>
            </a>
            <a href="" class="icon-anchor" target="_blank" rel="noopener noreferrer">
                <i class="fa fa-stack-overflow"></i>
                <span class="sr-only">Stack Overflow</span>
            </a>
        </section>

        <section class="top-section">
            <p>Portfolio: Emelie Svensson</p>
            <h1>frontend developer</h1>
            <h2>with teaching experience</h2>
        </section>
        <div class="profile-picture"><img src="./assets/DSC09522.JPG" alt="Profile picture of Emelie Svensson"></div>
        <picture class="hero">
            <source srcset="./assets/forest-large.jpg" media="(min-width: 1024px)" />
            <source srcset="./assets/forest-medium.jpg" media="(min-width: 768px)" />
            <img src="./assets/forest-small.jpg" alt="background image of forest" />
        </picture>
    </header>
    <main class="main-wrapper">
        <section class="summary">
            <p>Summary Summarum</p>
        </section>
        <section class="tech">
            <h3>Tech</h3>
        </section>
        <section class="projects">
            <section class="featured">
                <h3>Featured projects</h3>
                <!--Put featured projects here as cards-->
            </section>
            <section class="other">
                <h4>Other projects</h4>
            </section>
        </section>
        <section class="thoughts">
            <h3>My thoughts on code</h3>
        </section>
        <section class="skills">
            <h3>Skills</h3>
        </section>
        <section class="more">
            <h3>For more</h3>
        </section>
        <!--Does this have to be a section or can it be a div?-->
    </main>
    <footer class="footer">
        <section class="contact">
            <h3>Contact</h3>
        </section>
    </footer>

</body>

</html>
