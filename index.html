<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Coolio Portfolio</title>
</head>

<body>
    <div class="container">
        <header class="top-section">
            <section></section>
            <section class="header-text">
                <p></p>
                <h1></h1>
                <h2></h2>
            </section>
            <img src="" alt="Profile picture of Emelie Svensson"/>
        </header>
        <!--Header is the top-section, should contain: This is where you sell in your new self. You're happy to combine your previous experience with your new frontend skills or basically use this are to describe yourself the way you see your role in the future. Either you do something like "Frontend + design" or more of a sentence like; "Frontend developer with a background in communications". Or if you don't see yourself as a frontend developer in the future maybe you want to write something like; "Project manager with coding skills". It's your portfolio. Choose images so that they mirror who you are. -->

        <main>
            <section class="summary"></section>
            <!--Short and to the point, who am I? Future desires?-->
            <section class="tech"></section>
            <!--Short summary/name dropping of technologies, tools, libraries and things I know and will know during the course-->
            <section class="featured-projects">
                <h3>Featured projects</h3>
                <a href="">
                    <div class="overlay">
                        <img src="" alt="">
                    </div>
                    <p></p>
                </a>
            </section>
            <!--Should consist of all my projects that I'm mostly proud of. Mention technologies, libraries and APIs used. Make sure that everything here is a link to my GitHub-page (image, text, div etc)!-->
            <section class="other-projects">
                <h3>Other Projects</h3>
                <a href="">
                    <div class="overlay">
                        <img src="" alt="">
                    </div>
                    <p></p>
                </a>
            </section>
            <!--If I have any other projects I'd like to add-->
        </main>

        <section class="thoughts-and-skills">
            <div class="thoughts"></div>
            <!--This is the area where you really can present yourself and your thoughts about code. It's extremely helpful for recruiters to pick your brain a little and see that you don't just code – you also reflect. 

                Put a link to your reflections for the industry assignment after each sprint here or if you have ever written anything else on this topic. If you have only made LinkedIn posts as your reflection previously, try and get a few words down after next sprint on either medium or as an article on LinkedIn.-->
            <div class="skills"></div>
            <!--Place ALL your skills here. Feel free to add tech skills that are not in the course but things you have since before. In the other columns, place everything that you think will be useful for a job in tech. Softwares that you know, methodologies, leadership frameworks and basically whatever. -->
        </section>

        <footer class="footer"></footer>
    </div>
</body>

</html>
